windowrule = no_follow_mouse on, match:class ^(.+|.*)$
windowrule = center on, match:class ^(.+|.*)$
windowrule = float on, match:class ^(.+|.*)$
windowrule = animation gnomed, match:class ^(.+|.*)$

windowrule = size 1200 800, match:class ^(org.wezfurlong.wezterm|com.mitchellh.ghostty)$
windowrule = size 1200 800, match:class ^(discord|armcord|webcord)$
windowrule = size 1200 800, match:class ^(thunar)$, match:title ^(.+ - Thunar)$
windowrule = size 1200 800, match:class ^(gimp)$, match:title ^(GNU Image Manipulation Program)$
windowrule = size 1200 800, match:class  ^(com.obsproject.Studio)$
windowrule = size 1200 800, match:class ^(net.lutris.Lutris)$, match:title ^(Lutris|com.obsproject.Studio)$
windowrule = size 1200 800, match:class ^(Jan)$, match:title ^(Jan)$
windowrule = size 1200 800, match:class ^(firefox|brave-browser|chromium|libreWolf|org.gnome.Epiphany)$, match:title ^(Mozilla Firefox|.+ - Brave|.+ - Chromium|.+ - LibreWolf|.+)$
windowrule = size 1200 800, match:class ^(swengine.desktop)$, match:title ^(swengine.desktop)$
windowrule = size 1200 800, match:class ^(com.Nordix.+)$

general {
resize_on_border = true
extend_border_grab_area = 25
hover_icon_on_border = true
snap {
enabled = true
window_gap = 10
monitor_gap = 50
border_overlap = true
respect_gaps = true
}
}
misc {
animate_manual_resizes = true
animate_mouse_windowdragging =true
}
exec = nwg-dock-hyprland   
