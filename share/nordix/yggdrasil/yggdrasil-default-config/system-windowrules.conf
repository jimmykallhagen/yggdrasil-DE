# ##=========================================##
# :#           Nordix - Yggdrasil            #:
# :#     Default Yggdrasil - Windowrules     #:
# ##=========================================##

# ┌────────────────────────────────────────────────────────────────┐
# │        please do not write your changes in this file.          │
# ├────────────────────────────────────────────────────────────────┤
# | write all your own rules in the file:                          |
# | ~/.config/nordix/user/windowrules/windowrules.conf             |
# | the rules you write there will override the rules in this file |
# └────────────────────────────────────────────────────────────────┘

# Complete window rules reference for Hyprland 0.53+
# Based on: https://wiki.hypr.land/Configuring/Window-Rules/
#
# This file contains ALL available window rule options.
# Active rules are uncommented, unused options are commented
# for easy customization by the user.

# TIP: Use 'hyprctl clients' to find window class, title, etc.
# TIP: Use 'hyprctl layers' to find layer namespaces.
#
# WARNING: Rules are evaluated TOP TO BOTTOM - order matters!
# The last matching rule takes precedence.

# ##========================================##
# :#                                        #:
# :#     SECTION 1: SYNTAX REFERENCE        #:
# :#                                        #:
# ##========================================##

# NEW SYNTAX (0.53+):
# -------------------
# Anonymous rule:  windowrule = EFFECT, match:PROP value
# Named rule:      windowrule { name = x, match:class = y, effect = z }

# Multiple conditions: windowrule = effect, match:prop1 val1, match:prop2 val2
# All props must match for a rule to apply.

# Named rules can be toggled at runtime:
#   hyprctl keyword 'windowrule[rule-name]:enable false'
#   hyprctl keyword 'windowrule[rule-name]:enable true'

# REGEX NOTES:
# ------------
# Hyprland uses Google RE2 regex engine.
# Negate regex with prefix: negative:kitty
# No backreferences or lookahead supported.

# ##========================================##
# :#                                        #:
# :#     SECTION 2: MATCH PROPS             #:
# :#                                        #:
# ##========================================##

# Props determine WHICH windows a rule applies to.
# You must have at least one prop per rule.
# You cannot use the same prop twice in one rule.

# ┌───────────────────────────────────────┬────────────────────────────────────────────────┐
# │ PROP                                  │ DESCRIPTION                                    │
# ├───────────────────────────────────────┼────────────────────────────────────────────────┤
# │ match:class [RegEx]                   │ Window class (use hyprctl clients)             │
# │ match:title [RegEx]                   │ Window title                                   │
# │ match:initial_class [RegEx]           │ Class when window was created (static)         │
# │ match:initial_title [RegEx]           │ Title when window was created (static)         │
# │ match:tag [name]                      │ Windows with matching tag                      │
# │ match:xwayland [bool]                 │ XWayland windows (true/false)                  │
# │ match:float [bool]                    │ Floating windows (true/false)                  │
# │ match:fullscreen [bool]               │ Fullscreen windows (true/false)                │
# └───────────────────────────────────────┴────────────────────────────────────────────────┘

# ┌───────────────────────────────────────┬────────────────────────────────────────────────┐
# │ match:pin [bool]                      │ Pinned windows (true/false)                    │
# │ match:focus [bool]                    │ Currently focused window (true/false)          │
# │ match:group [bool]                    │ Grouped windows (true/false)                   │
# │ match:modal [bool]                    │ Modal dialogs like "Are you sure?" popups      │
# │ match:workspace [w]                   │ Windows on workspace (id, name:x, selector)    │
# │ match:content [int]                   │ Content type: 0=none, 1=photo, 2=video, 3=game │
# │ match:xdg_tag [RegEx]                 │ Match by xdgTag (check hyprctl clients)        │
# │ match:fullscreen_state_client [0-3]   │ Client fullscreen state                        │
# │ match:fullscreen_state_internal [0-3] │ Internal fullscreen state                      │
# └───────────────────────────────────────┴────────────────────────────────────────────────┘

# Fullscreen states: 0=none, 1=maximize, 2=fullscreen, 3=maximize+fullscreen
#
# NOTE: In hyprctl clients output:
#   fullscreen = fullscreen_state_internal
#   fullscreenClient = fullscreen_state_client

# ##========================================##
# :#                                        #:
# :#     SECTION 3: STATIC EFFECTS          #:
# :#                                        #:
# ##========================================##

# Static effects are evaluated ONCE when window opens.
# They use initialClass/initialTitle for matching.
# Cannot change based on title changes after creation.

# ┌────────────────────────────┬───────────────────────────────────────────────┐
# │ EFFECT                     │ DESCRIPTION                                   │
# ├────────────────────────────┼───────────────────────────────────────────────┤
# │ float [on]                 │ Float the window                              │
# │ tile [on]                  │ Tile the window                               │
# │ fullscreen [on]            │ Fullscreen the window                         │
# │ maximize [on]              │ Maximize the window                           │
# │ fullscreen_state [i] [c]   │ Set internal and client fullscreen state      │
# │ move [x] [y]               │ Move floating window (expressions allowed)    │
# │ size [w] [h]               │ Resize floating window (expressions allowed)  │
# │ center [on]                │ Center floating window on monitor             │
# └────────────────────────────┴───────────────────────────────────────────────┘

# ┌────────────────────────────┬───────────────────────────────────────────────┐
# │ pseudo [on]                │ Pseudotile the window                         │
# │ monitor [id]               │ Open on specific monitor (id or name)         │
# │ workspace [w]              │ Open on specific workspace (add 'silent')     │
# │ no_initial_focus [on]      │ Don't focus window when it opens              │
# │ pin [on]                   │ Pin to all workspaces (floating only)         │
# │ group [options]            │ Set group properties (see group options)      │
# │ suppress_event [types]     │ Ignore events: fullscreen maximize activate   │
# │                            │   activatefocus fullscreenoutput              │
# │ content [type]             │ Set content: none, photo, video, game         │
# │ no_close_for [ms]          │ Prevent closing for X milliseconds on open    │
# └────────────────────────────┴───────────────────────────────────────────────┘

# EXPRESSIONS for move/size:
#   monitor_w, monitor_h  - Monitor dimensions
#   window_w, window_h    - Window dimensions
#   window_x, window_y    - Window position
#   cursor_x, cursor_y    - Cursor position
#   Example: size (monitor_w*0.5) (monitor_h*0.5)
#   NOTE: No spaces in math! Use parentheses.

# GROUP OPTIONS:
#   set [always]     - Open as group
#   new              - Shorthand for barred set
#   lock [always]    - Lock the group
#   barred           - Don't auto-group into focused unlocked group
#   deny             - Don't allow toggling as or adding to group
#   invade           - Force open in locked group
#   override [opts]  - Override other group rules
#   unset            - Clear all group rules

# ##========================================##
# :#                                        #:
# :#     SECTION 4: DYNAMIC EFFECTS         #:
# :#                                        #:
# ##========================================##

# Dynamic effects are re-evaluated when window properties change.
# Example: border_color changes when window floats/tiles.

# ┌─────────────────────────────┬───────────────────────────────────────────────┐
# │ EFFECT                      │ DESCRIPTION                                   │
# ├─────────────────────────────┼───────────────────────────────────────────────┤
# │ opacity [a] [i] [f]         │ Opacity: active [inactive] [fullscreen]       │
# │                             │ Add 'override' after value for exact opacity  │
# │ border_color [color]        │ Border color (supports gradients)             │
# │ border_size [int]           │ Border thickness in pixels                    │
# │ rounding [int]              │ Corner rounding in pixels                     │
# │ rounding_power [float]      │ Override decoration:rounding_power            │
# │ animation [style] [opt]     │ Force animation style (opt is optional)       │
# │ tag [name]                  │ Apply tag (+name to set, -name to unset)      │
# └─────────────────────────────┴───────────────────────────────────────────────┘

# ┌─────────────────────────────┬───────────────────────────────────────────────┐
# │ max_size [w] [h]            │ Maximum size for floating windows             │
# │ min_size [w] [h]            │ Minimum size for floating windows             │
# │ idle_inhibit [mode]         │ Prevent idle: none, always, focus, fullscreen │
# │ persistent_size [on]        │ Remember size between app launches            │
# │ no_max_size [on]            │ Remove max size limits (fixes winecfg etc)    │
# │ stay_focused [on]           │ Force focus while visible                     │
# │ allows_input [on]           │ Force XWayland window to receive input        │
# │ dim_around [on]             │ Dim everything around window (floating)       │
# └─────────────────────────────┴───────────────────────────────────────────────┘

# ┌─────────────────────────────┬───────────────────────────────────────────────┐
# │ decorate [on]               │ Draw window decorations (default: true)       │
# │ focus_on_activate [on]      │ Focus when app requests activation            │
# │ keep_aspect_ratio [on]      │ Maintain aspect ratio when resizing           │
# │ nearest_neighbor [on]       │ Use nearest neighbor filtering                │
# │ no_anim [on]                │ Disable animations                            │
# │ no_blur [on]                │ Disable blur                                  │
# │ no_dim [on]                 │ Disable dimming                               │
# │ no_focus [on]               │ Disable focus                                 │
# │ no_follow_mouse [on]        │ Don't focus on mouse hover (follow_mouse=1)   │
# │ no_shadow [on]              │ Disable shadow                                │
# │ no_shortcuts_inhibit [on]   │ Don't let app inhibit shortcuts               │
# └─────────────────────────────┴───────────────────────────────────────────────┘

# ┌─────────────────────────────┬───────────────────────────────────────────────┐
# │ no_screen_share [on]        │ Hide from screen sharing (draws black)        │
# │ no_vrr [on]                 │ Disable VRR (when misc:vrr = 2 or 3)          │
# │ opaque [on]                 │ Force window to be opaque                     │
# │ force_rgbx [on]             │ Ignore alpha channel completely               │
# │ sync_fullscreen [on]        │ Sync fullscreen mode with client              │
# │ immediate [on]              │ Allow tearing for lower latency               │
# │ xray [on]                   │ Set blur xray mode                            │
# │ render_unfocused [on]       │ Render even when not visible                  │
# │ scroll_mouse [float]        │ Override input:scroll_factor                  │
# │ scroll_touchpad [float]     │ Override input:touchpad:scroll_factor         │
# └─────────────────────────────┴───────────────────────────────────────────────┘

# OPACITY NOTES:
#   - Values are MULTIPLIERS by default (0.5 * 0.5 = 0.25)
#   - Use 'override' for exact values: opacity 0.8 override
#   - Can go over 1.0 but product > 1.0 causes glitches
#   - Format: opacity [active] [inactive] [fullscreen]
#   - Example: opacity 0.8 override 0.7 override 1.0 override

# BORDER_COLOR NOTES:
#   - Single color: border_color rgb(FF0000)
#   - Gradient: border_color rgb(FF0000) rgb(00FF00) 45deg
#   - Active + inactive: border_color rgb(FF0000) rgb(00FF00) 45deg rgb(0000FF)

# ##========================================##
# :#                                        #:
# :#    SECTION 5: LAYER RULES REFERENCE    #:
# :#                                        #:
# ##========================================##

# Layers are not windows but special surfaces:
# app launchers, status bars, wallpapers, notifications
#
# Check layers with: hyprctl layers
#
# LAYER PROPS:
#   match:namespace [RegEx]  - Layer namespace

# LAYER EFFECTS:
# ┌─────────────────────────────┬──────────────────────────────────────────────┐
# │ EFFECT                      │ DESCRIPTION                                  │
# ├─────────────────────────────┼──────────────────────────────────────────────┤
# │ no_anim [on]                │ Disable animations                           │
# │ blur [on]                   │ Enable blur for layer                        │
# │ blur_popups [on]            │ Enable blur for popups                       │
# │ ignore_alpha [a]            │ Blur ignores pixels with opacity <= a        │
# │ dim_around [on]             │ Dim everything behind layer                  │
# │ xray [on]                   │ Blur xray mode (0=off, 1=on)                 │
# │ animation [style]           │ Set animation style                          │
# │ order [n]                   │ Layer order (higher = closer to edge)        │
# │ above_lock [0/1/2]          │ Render above lockscreen (2 = interactive)    │
# │ no_screen_share [on]        │ Hide from screen sharing                     │
# └─────────────────────────────┴──────────────────────────────────────────────┘

# ##========================================##
# :#                                        #:
# :#     TIPS & TROUBLESHOOTING             #:
# :#                                        #:
# ##========================================##

# USEFUL COMMANDS:
# ┌─────────────────────────────┬───────────────────────────────────────────┐
# │ COMMAND                     │ DESCRIPTION                               │
# ├─────────────────────────────┼───────────────────────────────────────────┤
# │ hyprctl clients             │ List all windows with properties          │
# │ hyprctl layers              │ List all layers                           │
# │ hyprctl reload              │ Reload configuration                      │
# │ hyprctl keyword             │ Change setting at runtime                 │
# └─────────────────────────────┴───────────────────────────────────────────┘


# FINDING WINDOW INFO:
# ┌──────────────────┬─────────────────────────────────────────────────────────────────┐
# │  Run             │ and look for                                                    │
# ├──────────────────┼─────────────────────────────────────────────────────────────────┤
# │ hyprctl clients  │ class: - Window class (use in match:class)                      │
# │                  │ title: - Window title (use in match:title)                      │
# │                  │ initialClass: - Class at creation (use in match:initial_class)  │
# │                  │ initialTitle: - Title at creation (use in match:initial_title)  │
# │                  │ xwayland: - Is it XWayland? (use in match:xwayland)             │
# │                  │ floating: - Is it floating? (use in match:float)                │
# │                  │ fullscreen: - Fullscreen state (use in match:fullscreen)        │
# └──────────────────┴─────────────────────────────────────────────────────────────────┘

# FINDING LAYER INFO:
# ┌──────────────────┬───────────────────────────┐
# │  Run             │ and look for              │
# ├──────────────────┼───────────────────────────┤
# │ hyprctl layers   │ namespace: (layers name)  │
# └──────────────────┴───────────────────────────┘
  
# COMMON ISSUES:
# ┌─────────────────────────────┬───────────────────────────────────────────┐
# │ ISSUES                      │ DESCRIPTION                               │
# ├─────────────────────────────┼───────────────────────────────────────────┤
# │ Rule not applying?          | Check if it's static vs dynamic           |
# │ Static rules only work on   | initialClass/initialTitle                 │
# │ Multiple rules?             | Last match wins (order matters!)          │
# │ Opacity looks wrong?        | Values multiply by default (use override) │
# │ Window not focusing?        | Check no_focus, no_initial_focus          │
# │ Shader/color issues?        | Avoid opaque, force_rgbx, content rules   │
# └─────────────────────────────┴───────────────────────────────────────────┘

# REGEX TIPS:
# ┌───────────────────────┬───────────────────────────────────────────┐
# │ REGEX                 │ DESCRIPTION                               │
# ├───────────────────────┼───────────────────────────────────────────┤
# │ ^(exact)$             | Match exactly                             |
# │ ^(foo|bar)$           | Match foo OR bar                          │
# │ ^(foo.*)$             |  Match foo followed by anything           │
# │ negative:foo          | Match when NOT foo                        │
# └───────────────────────┴───────────────────────────────────────────┘

#============================================#
#==#          Global Border Color          #=#
#============================================#

### Global Border Color ###
windowrule = border_color $frost-crystal $subl-withe-grey angle $nordix-glacier-blue, match:class ^(.+|.*)$

#============================================#
#==#             Web Browser               #=#
#============================================#

windowrule = border_color $nordix-tpred $nordix-tpred angle $nordix-glacier-blue $nordix-tpred, match:class ^(firefox|brave-browser|chromium|libreWolf|org.gnome.Epiphany)$
windowrule = border_color $nordix-ice $nordix-ghost angle $nordix-glacier-blue $nordix-ghost, match:class ^(chromium)$
windowrule = no_dim on, match:class ^(firefox|brave-browser|chromium|libreWolf|org.gnome.Epiphany)$
windowrule = no_blur on, match:class ^(firefox|brave-browser|chromium|libreWolf|org.gnome.Epiphany)$

#::: Opacity ::: Web Browser ::::#
windowrule = opacity 1.0 override, match:class ^(firefox|brave-browser|chromium|libreWolf|org.gnome.Epiphany)$

#============================================#
#==#               Gwenview               #==#
#============================================#

windowrule = float on, match:class ^(org.kde.gwenview)$
windowrule = animation gnomed, match:class ^(org.kde.gwenview)$
windowrule = no_dim on, match:class ^(org.kde.gwenview)$
windowrule = size 1400 1000, match:class ^(org.kde.gwenview)$
windowrule = border_color $gwenview-pink $subl-withe-grey angle $nordix-glacier-blue, match:class ^(org.kde.gwenview)$

#::: Opacity ::: Gwenview ::::#
windowrule = opacity 1.0 override, match:class ^(org.kde.gwenview)$

#============================================#
#==#                 Gimp                 #==#
#============================================#

# Rounding
windowrule = rounding 10, match:class ^(gimp)$, match:title ^(Change Foreground Color)$
windowrule = rounding_power 4, match:class ^(gimp)$, match:title ^(Change Foreground Color)$

# Rules 
windowrule = allows_input on, match:class ^(gimp)$

# Gimp Children Rules
windowrule = stay_focused on, match:class ^(gimp)$, match:title ^(Welcome to GIMP .+|Open .+|Change Foreground Color)$
windowrule = float on, match:class ^(gimp)$, match:title negative:^(GNU Image Manipulation Program)$
windowrule = animation gnomed, match:class ^(gimp)$, match:title negative:^(GNU Image Manipulation Program)$
windowrule = dim_around on, match:class ^(gimp)$, match:title negative:^(GNU Image Manipulation Program)$

# Render
windowrule = idle_inhibit always, match:class ^(gimp)$

# Decorations
windowrule = border_color $frost-crystal $subl-withe-grey angle $nordix-glacier-blue, match:class ^(gimp)$

#::: Opacity ::: Gimp ::::#
windowrule = opacity 1.0 override, match:class ^(gimp)$

#============================================#
#==#               Thunar                 #==# 
#============================================#

# Thunar Rules
windowrule = border_color $frost-crystal $subl-withe-grey angle $nordix-glacier-blue, match:class ^(thunar)$
windowrule = focus_on_activate on, match:class ^(thunar)$

# Thunar Children Rules
windowrule = float on, match:class ^(thunar)$, match:title negative:^(.+ - Thunar)$
windowrule = stay_focused on, match:class ^(thunar)$, match:title ^(Open Shell Script|Confirm to replace files)$
windowrule = allows_input on, match:class ^(thunar)$
windowrule = no_shadow on, match:class ^(thunar)$, match:title negative:^(.+ - Thunar)$
windowrule = animation gnomed, match:class ^(thunar)$, match:title negative:^(.+ - Thunar)$
#windowrule = float on, match:class ^(thunar)$, match:title negative:^(Thunar)$

# Ark Archive
windowrule = float on, match:class ^(org.kde.ark)$, match:title ^(Compress to Archive)$
windowrule = stay_focused on, match:class ^(org.kde.ark)$, match:title ^(Compress to Archive)$
windowrule = allows_input on, match:class ^(org.kde.ark)$, match:title ^(Compress to Archive)$

#============================================#
#==#               Zenity                 #==#
#============================================#

windowrule = stay_focused on, match:class ^(zenity)$
windowrule = float on, match:class ^(zenity)$
windowrule = dim_around on, match:class ^(zenity)$
windowrule = no_shadow on, match:class ^(zenity)$
windowrule = animation gnomed, match:title ^(zenity)$

#============================================#
#==#         xdg-desktop-portal           #==#
#============================================#

windowrule = float on, match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-.*)$
windowrule = float on, match:title ^(Add New Virtual Hardware|Save File|Open File)$

windowrule = focus_on_activate on, match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-.*)$
windowrule = focus_on_activate on, match:title ^(Save File|Open File|Add New Virtual Hardware)$

windowrule = animation gnomed, match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-.*)$
windowrule = animation gnomed, match:title ^(Save File|Open File|Add New Virtual Hardware)$

windowrule = dim_around on, match:class ^(xdg-desktop-portal-.*|xdg-desktop-portal-gtk)$
windowrule = dim_around on, match:title ^(Save File|Open File|Add New Virtual Hardware)$

windowrule = allows_input on, match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-.*)$
windowrule = allows_input on, match:title ^(Save File|Open File|Add New Virtual Hardware)$

windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$, match:title ^(Select Image)$
windowrule = animation gnomed, match:class ^(xdg-desktop-portal-gtk)$, match:title ^(Select Image)$
windowrule = dim_around on, match:class ^(xdg-desktop-portal-gtk)$, match:title ^(Select Image)$

#============================================#
#==#             exo-desktop              #==#
#============================================#
windowrule = float on, match:class ^(exo-desktop.*)$
windowrule = animation gnomed, match:class ^(exo-desktop.*)$
windowrule = dim_around on, match:class ^(exo-desktop.*)$


#============================================#
#==#            Desktop App's             #==#
#============================================#

### Upscayl ###
windowrule = float on, match:class ^(Upscayl)
windowrule = animation gnomed, match:class ^(Upscayl)
windowrule = dim_around on, match:class ^(Upscayl)
windowrule = no_blur on, match:class ^(Upscayl)
windowrule = size 1000 800, match:class ^(Upscayl)

#::: Opacity ::: Upscale ::::#
windowrule = opacity 1.0 override, match:class ^(Upscayl)

### Smile ###
windowrule = stay_focused on, match:class ^(it.mijorus.smile)$
windowrule = float on, match:class ^(it.mijorus.smile)$
windowrule = animation gnomed, match:class ^(it.mijorus.smile)$
windowrule = dim_around on, match:class ^(it.mijorus.smile)$
windowrule = size 600 700, match:class ^(it.mijorus.smile)$

### Gucharmap ###
windowrule = stay_focused on, match:class ^(gucharmap)$
windowrule = float on, match:class ^(gucharmap)$
windowrule = animation gnomed, match:class ^(gucharmap)$
windowrule = dim_around on, match:class ^(gucharmap)$

### Crow Translate ###
windowrule = focus_on_activate on, match:class ^(io.crow_translate.CrowTranslate)$
windowrule = no_shadow on, match:class ^(io.crow_translate.CrowTranslate)$
windowrule = animation gnomed, match:class ^(io.crow_translate.CrowTranslate)$

### Calculator ###
windowrule = float on, match:class ^(qalculate-gtk|org.gnome.Calculator)$
windowrule = animation gnomed, match:class ^(qalculate-gtk|org.gnome.Calculator)$
windowrule = no_shadow on, match:class ^(qalculate-gtk|org.gnome.Calculator)$
windowrule = focus_on_activate on, match:class ^(qalculate-gtk|org.gnome.Calculator)$
windowsrule = no_dim on, match:class ^(qalculate-gtk|org.gnome.Calculator)$

### Bluetooth ###
windowrule = stay_focused on, match:class ^(blueberry.py|blueman-manager)$
windowrule = float on, match:class ^(blueberry.py|blueman-manager)$
windowrule = animation gnomed, match:class ^(blueberry.py|blueman-manager)$
windowrule = dim_around on, match:class ^(blueberry.py|blueman-manager)$

### Audio Controls ###
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol|pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$
windowrule = size 800 600, match:class ^(pavucontrol)$
windowrule = animation zoomFactor, match:class ^(pavucontrol)$

### Network ###
windowrule = float on, match:class ^(nm-applet|nm-connection-editor)$
windowrule = stay_focused on, match:class ^(nm-applet|nm-connection-editor)$
windowrule = animation gnomed, match:class ^(nm-applet|nm-connection-editor)$
windowrule = dim_around on, match:class ^(nm-applet|nm-connection-editor)$

## WebCam ##
windowrule = size 1000 800, match:class ^(guvcview)$
windowrule = size 600 400, match:class ^(guvcview)$, match:title ^(Guvcview.+)$

windowrule = float on, match:class ^(guvcview)$

### Misc ###
windowrule = float on, match:class ^(timeshift-gtk)$
windowrule = focus_on_activate on, match:class ^(timeshift-gtk)$
windowrule = animation gnomed, match:class ^(timeshift-gtk)$

windowrule = float on, match:class ^(gnome-system-monitor)$
windowrule = focus_on_activate on, match:class ^(gnome-system-monitor)$
windowrule = animation gnomed, match:class ^(gnome-system-monitor)$

windowrule = float on, match:class ^(file-roller)$
windowrule = focus_on_activate on, match:class ^(file-roller)$
windowrule = animation gnomed, match:class ^(file-roller)$

windowrule = no_initial_focus on, match:title ^(ApplyWindow)$

#============================================#
#==#     Bazaar: Flatpak App Store        #==#
#============================================#

### Bazaar ###
#windowrule = float on, match:class ^(io.github.kolunmi.Bazaar)
