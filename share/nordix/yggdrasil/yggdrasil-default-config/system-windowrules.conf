windowrule = dim_around on, match:class ^(onagre)$
windowrule = opacity 1.0 override, match:class onagre 

#============================================#
#==#            Layer Rules               #==#
#============================================#

### Logout Dialog ###
layerrule = dim_around of, match:namespace logout_dialog
layerrule = blur on, match:namespace logout_dialog
layerrule = no_anim on, match:namespace logout_dialog
layerrule = ignore_alpha 0.3, match:namespace logout_dialog
layerrule = xray on, match:namespace logout_dialog

## Cosmic App launcher
layerrule = dim_around on, match:namespace app-library
layerrule = ignore_alpha 0.1, match:namespace app-library
layerrule = blur on, match:namespace app-library

### Ashell ###
layerrule = blur on, match:namespace ashell-main-layer
#layerrule = ignore_alpha 0.3, match:namespace ashell-main-layer
layerrule = order 1, match:namespace ashell-main-layer
layerrule = animation slide bottom,  match:namespace ashell-main-layer

### Swww Daemon ###
layerrule = no_anim on, match:namespace swww-daemon
layerrule = blur off, match:namespace swww-daemon

### Mpvpaper Wallpaper ###
layerrule = no_anim on, match:namespace mpvpaper

### Notifications ###
layerrule = no_anim on, match:namespace notifications

## ScreenShot
layerrule = no_anim on, match:namespace selection


