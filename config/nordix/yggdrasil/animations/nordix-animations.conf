# ##=========================================##
# :#          Nordix - Yggdrasil             #:
# :#   Hyprland Configuration - Animations   #:
# ##=========================================##

# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = true


##=========================================##
 # BEZIER CURVES
##=========================================##

    # Format: bezier = NAME, X0, Y0, X1, Y1
    # Values should be between 0 and 1 (Y can exceed for overshoot)
    #
    # Test curves: https://www.cssportal.com/css-cubic-bezier-generator/

    # Default curves
    bezier = easeOutQuint,   0.23, 0.3,  0.02, 0.2
    bezier = easeInOutCubic, 0.05, 0.2,  0.2,  0.8
    bezier = almostLinear,   0.5,  0.5,  0.75, 1.0

    # Smooth curves
    bezier = smooth,         0.25, 0.1,  0.25, 1.0
    bezier = smoothIn,       0.25, 1.0,  0.5,  1.0
    bezier = smoothOut,      0.36, 0.0,  0.66, -0.56

    # Overshoot curves (bounce past target, then settle)
    bezier = overshot,       0.05, 0.9,  0.1,  1.1
    bezier = overshotSoft,   0.1,  0.8,  0.2,  1.05
    bezier = overshotHard,   0.5,  1.0,  0.9,  0.31
    bezier = overshotMenu,   0.5,  2.1,  0.1,  0.21
    bezier = overshotSlow,   0.5,  2.0,  0.19, 0.31

    # Quick/snappy curves
    bezier = quick,          0.15, 0.0,  0.1,  1.0
    bezier = snappy,         0.2,  0.0,  0.0,  1.0

    # Ease curves
    bezier = easeIn,         0.42, 0.0,  1.0,  1.0
    bezier = easeOut,        0.0,  0.0,  0.58, 1.0
    bezier = easeInOut,      0.42, 0.0,  0.58, 1.0

    # Linear (no easing)
    bezier = linear,         0.0,  0.0,  1.0,  1.0

    # Special curves
    bezier = slow,           0.0,  0.85, 0.1,  1.0
    bezier = winIn,          0.1,  0.1,  0.4,  0.2
    bezier = winOut,         0.3,  -0.3, 0.2,  1.0
    bezier = windOvershot, 0.05, 0.0, 0.15, 1.35
 
  # Nordix - Brezier: Bounce
    bezier = nordixBounce, 0.5, 2.0, 0.19, 0.4

##=========================================##
 # FADE ANIMATIONS
##=========================================##
  animation = fade,          1, 4, smooth       # Base for all fade animations
  animation = fadeIn,        1, 9, smooth       # Fade in (window/layer open)
  animation = fadeOut,       1, 4, smoothOut    # Fade out (window/layer close)
  animation = fadeSwitch,    1, 4, smooth       # Fade when switching activewindow and its opacity
  animation = fadeShadow,    1, 4, smooth       # Shadow fade on changing activewindow
  animation = fadeDim,       1, 4, smooth       # Dim fade (inactive windows)
  animation = fadeLayers,    1, 4, smooth       # Base for layer fade
  animation = fadeLayersIn,  1, 9, smoothIn     # Layer fade in
  animation = fadeLayersOut, 1, 3, smoothOut    # Layer fade out
  animation = fadePopups,    1, 4, smooth       # Base for popup fade
  animation = fadePopupsIn,  1, 4, smoothIn     # Popup fade in
  animation = fadePopupsOut, 1, 3, smoothOut    # Popup fade out
  animation = fadeDpms,      1, 5, smooth       # Fade when DPMS is toggled (screen on/off)

##=========================================##
 # ZOOM / MONITOR ANIMATIONS
##=========================================##
  animation = zoomFactor,   1, 4, smooth
  animation = monitorAdded, 1, 4, smooth

##=========================================##
 # WINDOW ANIMATIONS
##=========================================##

       # Styles: slide, popin [%], gnomed      
 
       animation = windowsIn,   1, 4, nordixBounce, slide top
       animation = windowsOut,  1, 3, smoothOut, popin 80%
       animation = windowsMove, 1, 3, smooth

##=========================================##
 # LAYER ANIMATIONS
##=========================================##

  # Layers = app launchers, bars, notifications, overlays
  # Styles: slide, popin, fade

   animation = layersIn,  1, 5, nordixBounce, popin
   animation = layersOut, 1, 4, winOut, popin 40%

##=========================================##
 # BORDER ANIMATIONS
##=========================================##

    # border      = Border color change animation
    # borderangle = Gradient angle rotation
    #               Styles: once (default), loop

    #animation = border,      1, 5, smooth, 
    animation = borderangle, 1, 100, easeInOutCubic, loop

##=========================================##
 # WORKSPACE ANIMATIONS
##=========================================##

    # Styles: slide, slidevert, fade, slidefade, slidefadevert

    animation = workspaces,    1, 4, smooth,       slidefade
    animation = workspacesIn,  1, 3, easeInOutCubic, slidefade
    animation = workspacesOut, 1, 3, easeInOutCubic, slidefade

##=========================================##
 # SPECIAL WORKSPACE  ANIMATIONS
##=========================================##

    # Styles: slide, slidevert, fade, slidefade, slidefadevert
    # Direction can be added: top, bottom, left, right
    #   e.g., slidefade top, slidefadevert -50%

    animation = specialWorkspace,    1, 6, overshot,  slidefade top
    animation = specialWorkspaceIn,  1, 5, overshot,  slidefade top
    animation = specialWorkspaceOut, 1, 10, overshot, slidefade bottom
}
