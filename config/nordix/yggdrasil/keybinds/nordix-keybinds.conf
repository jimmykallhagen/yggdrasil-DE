bind = $mainMod2, Å, exec, /home/core/project/git/nordix-shader-system/gui/nordix-shader-gui-dev.py
##============================##
 # * Yggdrasil's - Keybinds * #
##============================##
source = ~/.config/nordix/yggdrasil/settings/nordix-defaults.conf

# Main Mods
$mainMod2 = SUPER
$mainMod = ALT

##=========================================##
 #         * Additional Settings *         #
##=========================================##
binds {
    allow_workspace_cycles = 1
    workspace_back_and_forth = 1
    workspace_center_on = 1
        movefocus_cycles_fullscreen = true
        window_direction_monitor_fallback = true

}

##=========================================##
 #    * Disable/Enable all keybinds *      #
 # * suitable for applications like GIMP * #
##=========================================##
## Press ALT + scroll lock to disable all  keybinds in hyprland
bind = $mainMod, SCROLL_LOCK, submap, clean
submap = clean

## Press only Scroll lock to activate again all keybinds
bind = , SCROLL_LOCK, submap, reset
submap = reset


###################################################################################################
bind = $mainMod2, i, exec, /home/core/project/git/nordix-shader-system/gui/nordix-shader-manager.py
##################################################################################################



##=========================================##
 #          * SpecialWorkspace *           #
##=========================================##
## Move focused window to SpecialWorkspace - Yggdrasil
bind = $mainMod, S, movetoworkspace, special:1 ❄️ Yggdrasil

## Move back window to regular Workspace 
bind = $mainMod2, S, movetoworkspace, +0

## Toggle between normal Workspace and SpecialWorkspace - Yggdrasil
bind = $mainMod2, 1, togglespecialworkspace, 1 ❄️ Yggdrasil

## Toggle between normal Workspace and SpecialuWorkspace - Game
bind = $mainMod2, 2, togglespecialworkspace, 2 ❄️ Game

## Toggle between normal Workspace and SpecialWorkspace - System Settings (⚙️)
bind = $mainMod2, 3, togglespecialworkspace, 3 ⚙️

## Toggle between normal Workspace and SpecialWorkspace - App Store
bind = $mainMod2, 4, togglespecialworkspace, 4 🏛️


##=========================================##
 #           * standard apps *             #
##=========================================##
## Opens your preferred filemanager (ALT + "E" - Becuse "F" dosent feels right, Fil"e" manager)
bind = $mainMod, E, exec, $system_filebrowser

# Closes (not kill) current window (ALT + "Q" - Quill??
bind = $mainMod, Q, killactive

## Runs your browser (ALT + "W" - Web)
bind = $mainMod, W, exec, $system_browser

## Opens Noridx Youtube App (ALT + "Y" -YouTube)
bind = $mainMod, Y, exec, $youtube

## Opens Nordix Keybind's helper - (ALT "H" - Help)
bindd = $mainMod, H, list of keybinds, exec, /usr/lib/nordix/yggdrasil/bin/yggdrasil-keybinds-overlay.py

## Runs your application launcher (ALT + "SPACE")
bind = $mainMod, SPACE, exec, $applauncher

## Runs your application launcher (SUPER + "SPACE")
bind = $mainMod2, SPACE, exec, onagre

## Emoji picker ("E" - Emoji)
bind = $mainMod, U, exec, $emoji

## Flatpak Store - Bazaar
bind = $mainMod, B, exec, bazaar

##=============================================##
 # * Socond layers of keybinds (ALT + SHIFT) * # 
 #      * Second layer - standard apps *       # 
##=============================================##
## Visual Editor ("E" - Editor)
bind = $mainMod SHIFT, E, exec, $system_visula_editor

## GNOME Character Map unicode ("U" - Unicode)
bind = $mainMod SHIFT, U, exec, gucharmap

## Crow translate ("T" - Translate)
bind = $mainMod SHIFT, T, exec, $translate

##=============================================##
 #  * Third layers of keybinds (ALT + SHIFT) * #
 #            * Misc functions *               #
##=============================================##
## Take color sample and save it to clipboard
bind = $mainMod SHIFT, P, exec, hyprpicker -a 

## hyprctl reload ("H" - Hyprctl)
bind = $mainMod2, H, exec, hyprctl reload

## Toggles current window fullscreen mode ("F" - Fullscreen)
bind = $mainMod2, F, fullscreen

## Restart/Reload Bar ("A" - Ashell)
bind = $mainMod2, A, exec, usr/lib/nordix/yggdrasil/bin//restart-ashell.sh

## Toggle scaling for Xwayland, to enable naitive resolutions for your gaming session ("S" - Scale)
bind = $mainMod2, X, exec, ~/.config/hypr/scripts/toggle-xwayland-scale.sh

## Pin current window (shows on all workspaces) "p - pin"
bind = $mainMod2, P, pin


##===================================================## 
 # * Nordix Shader system with custom CAPS keybind * #
##===================================================##
## Toggle shaders for differnt filter for your screen (ALT + CAPS) 
bindd = $mainMod, Hyper_L, ON/Toggle Nordix - Shaders, exec, ~/.config/hypr/scripts/shader-toggle

## No shader filters (SUPER + CAPS)
bindd = $mainMod2, Hyper_L, Nordix - Shaders OFF, exec, ~/.config/hypr/scripts/shader-off.sh

## Open Nordix Shader Manager
bind = $mainMod2, J, exec, /home/core/project/git/nordix-shader-system/gui/nordix-shader-gui-dev.py
bind = $mainMod2 SHIFT, J, exec, /home/core/project/git/nordix-shader-system/gui/nordix-shader-gui.py

##=============================================##
 #          * Terminal - Emulators *           #
##=============================================##
### (ALT + ENTER) ###
## Opens your preferred terminal emulator. Main Terminal (For you that wants key "ENTER" for your terminal)
bind = $mainMod, RETURN, exec, $system_terminal

### (ALT + T) ###
# Opens your preferred terminal emulator. Main Terminal - (For you that wants key "T" for your terminal)
bind = $mainMod, T, exec, $system_terminal

## (SUPER + ENTER) ###
## Opens your preferred terminal emulator. Alternative 2 -  For a second terminal emulator (For you that wants key "ENTER" for your second terminal)
bind = $mainMod2, RETURN, exec, $terminal_2

### (SUPER + T) ###
## Opens your preferred terminal emulator. Alternative 2 - For a second terminal emulator (For you that wants key "T" for your terminal)
bind = $mainMod2, T, exec, $terminal_2

# SUPER KEY VERSON OF THE TERMINALS KEYBINDS (can be used to get several different terminals if desired)
### (SUPER + ENTER) ###
## Opens your preferred terminal emulator. Main Terminal (For you that wants key "ENTER" for your terminal)
bind = $mainMod2, RETURN, exec, $system_terminal

### (SUPER + T) ###
# Opens your preferred terminal emulator. Main Terminal - (For you that wants key "T" for your terminal)
bind = $mainMod2, T, exec, $system_terminal

##==========================================================##
 #             * Nordix: Yggdrasil-  Settings *             #
##==========================================================##
### (ALT + N) ###
bind = $mainMod2, N, exec, /usr/lib/nordix/yggdrasil/system-gui/nordix-system-settings.py

##=============================================##
 #          * Toggle - Window mode *           #
##=============================================##
## Switches current window between floating and tiling mode (ALT + "C" - "Nedeed to be close to the left hand")
bind = $mainMod, C, togglefloating,

### * Dwindle only ###
## Toggle Pseudo Tilling ("SUPER + C" - "Nedeed to be close to the left")
bind = $mainMod2, C, pseudo


##=============================================##
 #                  * Zoom *                   #
##=============================================##
## Zoom in with right klick (CTRL + ALT + Right mouse bottom)
bind = $mainMod CTRL, mouse:272, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.2')

## Go back to normal with left klick (CTRL + ALT + Left mouse bottom)
bind = $mainMod CTRL, mouse:273, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.0006) | if . < 1 then 1 else . end')


##=============================================##
 #               * Screenshots *               #
##=============================================##
### (PRINT) ###
# - Creates a screenshot of monitor
bind = , Print, exec, /usr/lib/nordix/yggdrasil/scripts/grimblast-active-screen.sh

### (CTRL + PRINT) ###
# - Creates a screenshot of to clippboard
bind = CTRL, Print, exec, /usr/lb/nordix/scripts/grimblast-to-clipboard.sh


### (SHIFT + PRINT) ###
# - Creates a screenshot of the selected area
bind = SHIFT, Print, exec, /usr/lib/nordix/yggdrasil/scripts/grimblast-selected-area.sh


### (ALT - PRITNT) ###
# - Creates a screenshot of the active application that has focus
bind = ALT, Print, exec, /usr/lib/nordix/yggdrasil/scripts/grimblast-active-application.sh


##=============================================##
 #                 * Groups *                  #
##=============================================##
### (ALT + G) ###
# - Create/Release grups
bind = $mainMod, G, togglegroup

### (ALT + SHIFT + G) ###
# - Toggle grouped windows
bind = $mainMod SHIFT, G, changegroupactive, f


##=============================================##
  #             * Toggle Gaps *                #
##=============================================##
### (ALT + SHIFT + D) "D - Distance" ###
# Preset: 1 - Small gaps between window
bind = $mainMod SHIFT, D, exec, hyprctl --batch "keyword general:gaps_out 15;keyword general:gaps_in 8"

### (SUPER + SHIFT + D) "D - Distance" ###
# Preset: 2 - Big gaps between window
bind = $mainMod2 SHIFT, D, exec, hyprctl --batch "keyword general:gaps_out 40;keyword general:gaps_in 15"

### (SUPER + D) "D - Distance" ###
# Set default gaps between window - Reload hyprlands config
bind = $mainMod2, D, exec, hyprctl reload



