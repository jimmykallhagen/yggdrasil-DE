#
#

##======================================##
#             INTEL - GPU               #
##======================================##
#
##===========================================================##
# env = LIBVA_DRIVER_NAME,intel  # Intel Video acceleration
# env = VDPAU_DRIVER,intel  # Intel video decoding
##===========================================================##
#
#

##======================================##
#               GPU MISC                #
##======================================##
#
##==================================================##
